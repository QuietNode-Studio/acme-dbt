version: 2

models:
  - name: fct_orders
    description: Order fact grain = one order. The total_revenue metric reads amount from here — dollars, already converted in staging.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: dim_customers
    description: Customer dimension with lifetime aggregates.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
